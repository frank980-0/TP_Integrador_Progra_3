<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patitas</title>
  <link rel="stylesheet" href="./css/estilos.css">
</head>

<body>
  <section id="pantalla-inicio">
    <h1>Bienvenidos a Patitas</h1>
    <p>Encontra lo que tu mascota necesita</p>
    <input type="text" id="input-nombre" placeholder="Nombre" required />
    <div class="botones_inicio">
      <button id="btn-entrar">Entrar</button>
      <button id="btn-admin">Administrador</button>
    </div>
  </section>

  <section id="pantalla-login-admin" class="oculta">
    <h2>Ingreso de Personal</h2>
    <p>Por favor, valide su identidad para gestionar la tienda.</p>

    <div style="margin-bottom: 10px;">
      <input type="text" id="input-admin-user" placeholder="Usuario">
    </div>
    <div style="margin-bottom: 10px;">
      <input type="password" id="input-admin-pass" placeholder="Contraseña">
    </div>

    <button id="btn-validar-admin">Ingresar</button>
    <button id="btn-cancelar-admin">Cancelar</button>
  </section>

  <section id="pantalla-admin" class="oculta">
    <h2>Panel de Administración</h2>
    <p>Acá se gestionará el stock de la tienda.</p>

    <div id="contenedor-gestion-productos"></div>

    <button id="btn-volver-admin">Volver al Inicio</button>
  </section>

  <section id="pantalla-productos" class="ocultar">
    <h2>Catalogo</h2>
    <div>Carrito</div>
    <nav>
      <button id="btn-filtro-todos">Todos</button>
      <button id="btn-filtro-perros">Perros</button>
      <button id="btn-filtro-gatos">Gatos</button>
    </nav>
    <div id="lista_productos"></div>
  </section>

  <section id="pantalla-carrito" class="oculta">
    <h2>Tu Carrito</h2>
    <div id="lista-carrito-detalle"></div>
    <h3>Total: $<span id="total-carrito">0</span></h3>
    <button id="btn-finalizar-compra">Finalizar Compra</button>
    <button id="btn-seguir-comprando">Seguir Comprando</button>
  </section>

  <section id="pantalla-ticket">
    <div id="ticket-contenido">
      <!-- Se llena dinámicamente -->
    </div>
    <button id="btn-salir-nuevo-cliente">Salir / Nuevo Cliente</button>
  </section>

  <script type="module" src="./js/main.js"></script>
</body>

</html>
